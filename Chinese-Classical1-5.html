        // 語音播放優化：優先女聲，語速0.9，音調1.05，標點細緻停頓
        async function playAudio(text) {
            if (!('speechSynthesis' in window)) { showError("您的瀏覽器不支援語音朗讀功能。"); return; }
            window.speechSynthesis.cancel();
            
            let voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                await new Promise(resolve => {
                    const id = setInterval(() => {
                        voices = window.speechSynthesis.getVoices();
                        if (voices.length > 0) { clearInterval(id); resolve(); }
                    }, 100);
                });
            }

            // 優先尋找高品質女聲
            let targetVoice = voices.find(v => (v.lang === 'zh-TW' || v.lang === 'cmn-Hant-TW' || v.lang === 'zh-CN') && 
                (v.name.includes('Google 國語') || v.name.includes('Mei-Jia') || v.name.includes('Yating') || v.name.includes('Lili') || v.name.includes('Ting-Ting') || v.name.includes('Xiaoxiao')));
            
            if (!targetVoice) targetVoice = voices.find(v => v.lang === 'zh-TW' || v.lang === 'cmn-Hant-TW'); 
            if (!targetVoice) targetVoice = voices.find(v => v.lang.startsWith('zh'));

            // 細緻標點分割與停頓控制
            const chunks = text.split(/([，、。？！；：])/).reduce((acc, curr, i) => {
                if (i % 2 === 0) { 
                    if (curr.trim()) acc.push({ text: curr, pause: 0 });
                } else { 
                    if (acc.length > 0) {
                        acc[acc.length - 1].text += curr;
                        if (['。', '！', '？'].includes(curr)) acc[acc.length - 1].pause = 800;
                        else if (['；', '：'].includes(curr)) acc[acc.length - 1].pause = 600;
                        else acc[acc.length - 1].pause = 400; 
                    }
                }
                return acc;
            }, []);

            if (chunks.length === 0) return;

            const playNext = (index) => {
                if (index >= chunks.length) return;
                const utterance = new SpeechSynthesisUtterance(chunks[index].text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.9;  // 放慢語速至 0.9
                utterance.pitch = 1.05; // 提高音調至 1.05
                if (targetVoice) utterance.voice = targetVoice;
                
                utterance.onend = () => { setTimeout(() => playNext(index + 1), chunks[index].pause); };
                window.speechSynthesis.speak(utterance);
            };

            playNext(0);
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-msg').innerText = msg;
            toast.classList.remove('hidden');
            requestAnimationFrame(() => { toast.classList.remove('translate-y-10', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.classList.add('hidden'), 300); }, 4000);
        }
