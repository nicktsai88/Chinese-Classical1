        // --- Questions Data (高難度、高鑑別度全真模擬試題) ---
        const questionsData = [
            { id: 1, category: "字義辨析", question: "「以其『病』病」句中，第一個「病」字的詞性與意義為何？", options: ["名詞，指疾病", "動詞，指生病", "動詞，以為病、擔憂", "副詞，病態地"], answer: 2, explanation: "(C)正確。此處的「病」為意動用法（動詞），意為「把……當作毛病/缺點」，或引申為「擔憂、警惕」。" },
            { id: 2, category: "多義字判斷", question: "「不知不知，病」中的「病」意為「缺點、毛病」（名詞）。下列文句中的「病」字，何者意思與此相同？", options: ["君子「病」無能焉，不病人之不己知也", "向吾不為斯役，則久已「病」矣", "人之「病」，病在好為人師", "伯牛有「病」，子問之"], answer: 2, explanation: "(C)正確。孟子名言，意指人的「毛病/缺點」在於喜歡當別人的老師。(A)擔憂(動詞)。(B)困苦不堪(形容詞/動詞)。(D)疾病(名詞)。" },
            { id: 3, category: "文意解讀", question: "老子說：「知不知，上」。這句話傳達的核心哲理為何？", options: ["能預知未來不可知的事物，是最高明的能力", "學習知識是沒有止境的，必須不斷向上攀登", "明白並承認自己有所不知（有局限），才是最高明的智慧", "裝作什麼都不知道，是明哲保身的上策"], answer: 2, explanation: "(C)正確。「知不知」是指「知道自己有所不知」，老子認為這是一種能夠正視自身局限的自省智慧，故稱為「上（最高明）」。" },
            { id: 4, category: "跨文本比較", question: "孔子曾言：「知之為知之，不知為不知，是知也。」這句話的求知態度，與本文中哪一種境界最相近？", options: ["知不知，上", "不知不知，病", "以其病病", "是以不病"], answer: 0, explanation: "(A)正確。孔子強調要誠實面對自己的無知（不知為不知），這與老子「知不知，上（知道自己有所不知是最高明的）」皆在強調自知之明與謙卑的求知態度。" },
            { id: 5, category: "國學常識", question: "進脩想上網搜尋本文作者的生平與核心思想，下列哪一組關鍵字會查「不到」想要的資料？", options: ["春秋時期、李耳、柱下史", "逍遙遊、齊物論、夢蝶", "道德經、五千言、無為而治", "柔弱勝剛強、反者道之動"], answer: 1, explanation: "(B)正確。本文作者為老子。「逍遙遊、齊物論、夢蝶」是莊子的代表作與典故。(A)(C)(D)皆為老子的背景與思想特色。" },
            { id: 6, category: "深層推論", question: "依據本文邏輯，「聖人不病」的最根本原因為何？", options: ["因為聖人天生聰慧，學識淵博而無所不知", "因為聖人懂得趨吉避凶，不會讓自己生病", "因為聖人能將『自以為是』視為缺點並時刻保持警惕", "因為聖人清心寡欲，不追求任何世俗的學問"], answer: 2, explanation: "(C)正確。「以其病病，是以不病」意指聖人因為把「不知不知（無知卻自以為知）」當作一種毛病來警惕防範，所以才能夠不犯這種毛病。" },
            { id: 7, category: "現代情境轉化", question: "心理學上的「達克效應（Dunning-Kruger effect）」指出：能力欠缺的人常有一種虛幻的自我優越感，錯誤地認為自己比真實情況更優秀。這最符合本文中哪一種人的描述？", options: ["知不知", "不知不知", "聖人不病", "以其病病"], answer: 1, explanation: "(B)正確。「不知不知」指的是「不知道自己其實是無知的（反而自以為懂）」，這完美對應了達克效應中能力不足卻過度自信的狀態。" },
            { id: 8, category: "成語應用", question: "若要用一句成語來形容「不知不知，病」這種狀態的盲目與危險，下列何者最為貼切？", options: ["虛懷若谷", "剛愎自用", "大智若愚", "妄自菲薄"], answer: 1, explanation: "(B)正確。「剛愎自用」形容固執己見，自以為是，聽不進別人的意見，與「不知不知（無知卻自以為懂）」的狀態最相近。(A)謙虛。(C)有智慧的人不炫耀。(D)過度自卑。" },
            { id: 9, category: "修辭辨識", question: "「以其病病，是以不病」句中連續出現的兩個「病」字，前為動詞後為名詞，詞性發生改變。這屬於下列哪一種修辭手法？", options: ["轉品", "借代", "譬喻", "誇飾"], answer: 0, explanation: "(A)正確。一個詞彙改變其原來的詞性而在語句中具有另一種詞性的作用，稱為「轉品」。第一個「病」名詞作動詞用（以為病）。" },
            { id: 10, category: "跨文化哲學", question: "古希臘哲學家蘇格拉底曾說：「我唯一知道的，就是我一無所知。」這句話與本文「知不知，上」的共通點為何？", options: ["皆主張放棄學習，因為知識是無窮盡的", "皆強調人類無法探究宇宙的真理", "皆認為承認自身的無知與局限，才是智慧的起點", "皆抱持著不可知論的消極悲觀態度"], answer: 2, explanation: "(C)正確。東西方哲人皆指出，真正的智慧不在於知道多少，而在於能夠察覺並承認自己的無知（知不知）。" },
            { id: 11, category: "文言虛詞", question: "下列各句中的「以」字，何者與「『以』其病病」的「以」字意義與用法相同？", options: ["不「以」物喜，不以己悲", "屬予作文「以」記之", "「以」子之矛，攻子之盾", "晉侯、秦伯圍鄭，「以」其無禮於晉"], answer: 3, explanation: "(D)正確。「以其病病」的以，解釋為「因為」。(D)出自〈燭之武退秦師〉，因為。(A)因為（但後接名詞，此處D的用法後接子句更為相近）。(B)用來(連詞)。(C)用(介詞)。" },
            { id: 12, category: "現代新聞標題", question: "若要為這段文字提煉出一個符合現代媒體風格的專欄標題，下列何者最能精準涵蓋全文主旨？", options: ["《名醫開講：預防百病的養生秘訣》", "《職場生存學：如何完美隱藏自己的缺點》", "《大師智慧：承認無知，才是終結愚昧的開始》", "《道德危機：現代人為何越來越不誠實？》"], answer: 2, explanation: "(C)正確。本文的核心是探討認知上的「自知之明」（知不知）以及對「自以為是」（不知不知）的警惕，(C)最契合此意涵。" },
            { id: 13, category: "省略主語判斷", question: "「以其病病，是以不病」這兩句話為求精簡省略了主語，請判斷其主語應為下列何者？", options: ["老子", "聖人", "常人", "疾病"], answer: 1, explanation: "(B)正確。承接上一句「是以聖人不病」，接下來解釋原因：「（聖人）以其病病，是以（聖人）不病」。" },
            { id: 14, category: "邏輯謬誤分析", question: "根據老子的觀點，「不知」本身並非最嚴重的問題，最可怕的是陷入何種狀態？", options: ["知道的太多而自尋煩惱", "對自己的無知毫無自覺，甚至不懂裝懂", "知道自己無知，卻感到自卑而放棄學習", "無法將書本上的知識應用於日常生活中"], answer: 1, explanation: "(B)正確。老子認為「不知不知（不知道自己無知）」才是一種「病（毛病/禍害）」。" },
            { id: 15, category: "文學風格判斷", question: "本文出自《老子》，這段文字的表述方式最能體現道家文章的哪一種典型特色？", options: ["氣勢磅礴，多用荒誕誇飾的寓言", "辭藻華麗，講究嚴格的對仗與平仄", "言簡意賅，充滿正反對比與辯證的哲理", "溫柔敦厚，強調修身齊家的道德規範"], answer: 2, explanation: "(C)正確。老子《道德經》的特色就是文字精簡，且極度擅長運用正反對立（知與不知、病與不病）的辯證邏輯來闡述哲理。(A)偏向莊子。(D)偏向儒家。" },
            { id: 16, category: "跨文本推演", question: "歐陽脩在〈六一居士傳〉中展現對貶謫的豁達，而本文的老子則提出對無知的警惕。兩人皆為古代哲人，下列何者是他們在思想底蘊上的共通之處？", options: ["皆強調積極入世，為朝廷建功立業", "皆具有超越世俗表象，深刻洞察自身狀態的自省智慧", "皆以道家思想為唯一的行為準則，排斥其他學說", "皆充滿了懷才不遇的憤懣，藉由寫作發洩情緒"], answer: 1, explanation: "(B)正確。歐陽脩能客觀看待自身的五物與衰老（達觀自省），老子則能客觀看待人類認知的極限（知不知的自省），兩者皆具有極高的自我覺察智慧。" },
            { id: 17, category: "綜合鑑賞", question: "關於本文的文學價值與哲學意涵，下列敘述何者「錯誤」？", options: ["全文僅寥寥二十餘字，卻深刻剖析了人類認知論的核心難題", "運用反覆出現的「知」與「病」字，形成節奏感與強烈的思辨性", "點出在求知的過程中，「虛心自省的態度」比「知識的數量」更為重要", "旨在鼓勵人們為了達到「上」的境界，應該拋棄所有學問，保持絕對的無知"], answer: 3, explanation: "(D)錯誤。老子說「知不知」是指要對自己的認知盲區保持警覺與謙卑，而非鼓勵人們不去學習或故意保持無知。" },
            { id: 18, category: "字義解析", question: "文中「知不知，上」的「上」字，與下列哪一個詞語中的「上」字意思最相近？", options: ["迎頭趕「上」", "高高在「上」", "「上」善若水", "「上」下其手"], answer: 2, explanation: "(C)正確。「上」此處作形容詞/名詞，意為「上等、最好、最高明」。「上善若水」的「上」也是最高、最完美的意思。(A)追趕。(B)方位。(D)比喻暗中作弊。" },
            { id: 19, category: "句型結構分析", question: "「知不知，上」在句型結構上屬於判斷句。下列文句，何者亦屬於「判斷句」的結構？", options: ["是以聖人不病", "蓮，花之君子者也", "使童子燭之", "以其病病"], answer: 1, explanation: "(B)正確。判斷句通常用來解釋事物的屬性或本質。(B)周敦頤〈愛蓮說〉，說明蓮花「是」花中的君子，為典型判斷句。本文「知不知，（是）上」亦同。" },
            { id: 20, category: "總結推論", question: "依據文本，若一個人真的能夠實踐「以其病病」，他最終會達到何種理想狀態？", options: ["成為一個知識淵博但因為過度讀書而體弱多病的人", "因為過度擔憂自己的缺點而患上嚴重的精神焦慮症", "脫離了「不懂裝懂」的盲目，免於犯下自以為是的毛病", "成為一個精通醫術，能治癒天下人身體疾病的名醫"], answer: 2, explanation: "(C)正確。把毛病當作毛病來警惕（以其病病），就能避免犯下「不知不知」的錯，達到「不病（不犯自以為是的毛病）」的境界。" }
        ];

        // --- State Management ---
        let currentState = {
            username: '',
            answers: {},
            mistakes: [], 
            favorites: [],
            viewMode: 'all',
        };

        const ui = {
            usernameInput: document.getElementById('username'),
            userDisplay: document.getElementById('user-display'),
            usernameSpan: document.getElementById('username-span'),
            dashboardUsername: document.getElementById('dashboard-username'),
            dashWrongCount: document.getElementById('dash-wrong-count'),
            dashFavCount: document.getElementById('dash-fav-count'),
            quickLoginArea: document.getElementById('quick-login-area'),
            recentUsersList: document.getElementById('recent-users-list'),
            statCorrect: document.getElementById('stat-correct'),
            statWrong: document.getElementById('stat-wrong'),
            quizListContainer: document.getElementById('quiz-list-container'),
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text'),
            quizHeaderTitle: document.getElementById('quiz-header-title'),
            views: {
                login: document.getElementById('view-login'),
                dashboard: document.getElementById('view-dashboard'),
                quiz: document.getElementById('view-quiz')
            }
        };

        // --- Initialization ---
        function init() {
            if (isFirebaseReady) {
                const globalRef = doc(db, COLLECTION_NAME, DOC_GLOBAL);
                onSnapshot(globalRef, (docSnap) => {
                    updateConnectionStatus('success', '連線成功');
                    if (docSnap.exists()) {
                        renderRecentUsers(docSnap.data().users || []);
                    }
                }, (error) => {
                    console.error("Global listen error", error);
                    updateConnectionStatus('error', '雲端錯誤');
                });
            } else {
                renderRecentUsers([]); 
            }
        }

        function updateConnectionStatus(type, text) {
            ui.statusText.textContent = text;
            ui.statusDot.className = 'status-dot';
            if (type === 'loading') ui.statusDot.classList.add('status-loading');
            else if (type === 'success') ui.statusDot.classList.add('status-success');
            else if (type === 'error') ui.statusDot.classList.add('status-error');
        }

        function renderRecentUsers(users) {
            if (users && users.length > 0) {
                ui.quickLoginArea.classList.remove('hidden');
                ui.recentUsersList.innerHTML = '';
                // 反轉陣列讓最新的在前面，取前 10 名
                [...users].reverse().slice(0, 10).forEach(user => {
                    const btn = document.createElement('button');
                    // 嚴格遵守：按鈕要大，圓角，加上 text-4xl 的 🧑‍🎓
                    btn.className = 'bg-white hover:bg-teal-50 border-4 border-solid border-teal-200 text-teal-800 rounded-[1.5rem] px-4 py-2 transition-transform hover:-translate-y-1 shadow-[0_4px_0_#99f6e4] active:translate-y-1 active:shadow-none font-bold flex items-center gap-2 text-lg';
                    btn.innerHTML = `<span class="text-4xl">🧑‍🎓</span> <span>${user}</span>`;
                    btn.onclick = () => {
                        ui.usernameInput.value = user;
                        window.attemptLogin();
                    };
                    ui.recentUsersList.appendChild(btn);
                });
            } else {
                 ui.quickLoginArea.classList.add('hidden');
            }
        }

        // --- Login Logic ---
        window.attemptLogin = async function() {
            const name = ui.usernameInput.value.trim();
            if (!name) { window.customAlert('請輸入姓名才能開始喔！✨'); return; }
            
            currentState.username = name;
            
            if (isFirebaseReady) {
                const globalRef = doc(db, COLLECTION_NAME, DOC_GLOBAL);
                setDoc(globalRef, { users: arrayUnion(name) }, { merge: true })
                    .catch(e => console.error("Global user update error:", e));
                startUserListener(name);
            }

            ui.userDisplay.classList.remove('hidden');
            ui.usernameSpan.textContent = name;
            ui.dashboardUsername.textContent = name;
            
            switchView('dashboard');
        }

        function startUserListener(username) {
            if (currentUserUnsubscribe) currentUserUnsubscribe();

            const userRef = doc(db, COLLECTION_NAME, username);
            
            currentUserUnsubscribe = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    currentState.favorites = data.favorites || [];
                    currentState.mistakes = data.mistakes || [];
                    ui.dashWrongCount.textContent = currentState.mistakes.length;
                    ui.dashFavCount.textContent = currentState.favorites.length;

                    if (data.progress) {
                        currentState.answers = data.progress.answers || {};
                    }
                } else {
                    currentState.favorites = [];
                    currentState.mistakes = [];
                    currentState.answers = {};
                    ui.dashWrongCount.textContent = 0;
                    ui.dashFavCount.textContent = 0;
                }
                if(currentState.username && !ui.views.quiz.classList.contains('hidden')) {
                    renderWaterfallQuiz();
                }
            });
        }

        function switchView(viewName) {
            Object.values(ui.views).forEach(el => el.classList.add('hidden'));
            ui.views[viewName].classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        window.startExam = function() {
            currentState.viewMode = 'all';
            switchView('quiz');
            renderWaterfallQuiz();
        }

        window.showDashboard = function() {
            switchView('dashboard');
        }

        window.restartQuiz = function() {
            window.customConfirm("確定要重新開始測驗嗎？🔄\n這會清除本回的「作答紀錄」，但「錯題本」與「收藏」都會保留喔！", () => {
                currentState.answers = {};
                saveProgress();
                renderWaterfallQuiz();
                window.scrollTo({top:0, behavior:'smooth'});
            });
        }

        // --- Waterfall Render Logic ---
        function renderWaterfallQuiz() {
            const container = ui.quizListContainer;
            container.innerHTML = ''; 

            let questionsToRender = questionsData;
            let titleHtml = '';

            if (currentState.viewMode === 'wrong') {
                questionsToRender = questionsData.filter(q => currentState.mistakes.includes(q.id));
                titleHtml = `<span class="text-3xl">❌</span> <span class="text-amber-600">錯題本複習</span> <span class="text-base text-gray-400 ml-2 border-2 border-dashed border-gray-300 rounded-full px-3 py-1">共 ${questionsToRender.length} 題</span>`;
                
                if (questionsToRender.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 bg-white border-4 border-solid border-gray-200 rounded-[2.5rem]"><div class="text-6xl mb-4">🎉</div><p class="text-2xl font-bold text-gray-500">太棒了！目前沒有錯題紀錄！</p></div>`;
                }
            } else if (currentState.viewMode === 'favorite') {
                questionsToRender = questionsData.filter(q => currentState.favorites.includes(q.id));
                titleHtml = `<span class="text-3xl">⭐</span> <span class="text-teal-600">我的最愛</span> <span class="text-base text-gray-400 ml-2 border-2 border-dashed border-gray-300 rounded-full px-3 py-1">共 ${questionsToRender.length} 題</span>`;
                
                if (questionsToRender.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 bg-white border-4 border-solid border-gray-200 rounded-[2.5rem]"><div class="text-6xl mb-4">🤍</div><p class="text-2xl font-bold text-gray-500">目前還沒有收藏的題目喔！</p></div>`;
                }
            } else {
                questionsToRender = questionsData;
                titleHtml = `<span class="text-3xl">📝</span> <span class="text-rose-600">全真模擬試題</span> <span class="text-base text-gray-400 ml-2 border-2 border-dashed border-gray-300 rounded-full px-3 py-1">共 ${questionsData.length} 題</span>`;
            }

            ui.quizHeaderTitle.innerHTML = titleHtml;

            let correctCount = 0;
            let wrongCount = 0;

            questionsToRender.forEach((q) => {
                const userAnswer = currentState.answers[q.id];
                const isAnswered = userAnswer !== undefined;
                const isCorrect = isAnswered && userAnswer === q.answer;
                
                if (isAnswered) {
                    if (isCorrect) correctCount++;
                    else wrongCount++;
                }

                // 嚴格遵守：卡片底色與邊框依狀態改變
                let borderColor = 'border-gray-300';
                let bgColor = 'bg-white';
                if (isAnswered) {
                    if (isCorrect) {
                        borderColor = 'border-teal-400';
                        bgColor = 'bg-teal-50';
                    } else {
                        borderColor = 'border-rose-400';
                        bgColor = 'bg-rose-50';
                    }
                }

                const card = document.createElement('div');
                card.className = `relative rounded-[2.5rem] shadow-sm border-4 border-solid p-6 md:p-8 transition-colors duration-300 ${borderColor} ${bgColor}`;
                
                // 嚴格遵守：標籤與題目上下排列，標題上方要有紅色明顯的考點標籤
                const isFav = currentState.favorites.includes(q.id);
                const headerHtml = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex flex-col w-full">
                            <div class="mb-3">
                                <span class="inline-block bg-rose-100 border-2 border-solid border-rose-300 text-rose-700 font-bold rounded-xl px-3 py-1 text-sm tracking-widest shadow-sm">
                                    📌 【${q.category}】
                                </span>
                            </div>
                            <div class="flex items-start gap-3 w-full">
                                <span class="flex-shrink-0 bg-amber-400 border-2 border-solid border-amber-500 text-amber-900 font-black rounded-full w-10 h-10 flex items-center justify-center text-lg shadow-sm mt-1">
                                    ${q.id}
                                </span>
                                <h3 class="text-xl md:text-2xl font-black text-gray-800 leading-relaxed font-serif tracking-wide pt-1">
                                    ${q.question}
                                </h3>
                            </div>
                        </div>
                        <button onclick="window.toggleFavorite(${q.id})" class="text-4xl transition-transform hover:scale-110 flex-shrink-0 mt-1 ml-4 focus:outline-none">
                            ${isFav ? '⭐' : '🤍'}
                        </button>
                    </div>
                `;

                // 嚴格遵守：選項為獨立的大按鈕 `rounded-[1.5rem]`
                let optionsHtml = '<div class="grid gap-4">';
                q.options.forEach((opt, optIdx) => {
                    const letter = ['A','B','C','D'][optIdx];
                    let btnClass = "option-btn w-full text-left p-4 md:p-5 rounded-[1.5rem] border-4 border-solid flex items-center group ";
                    let badgeClass = "w-10 h-10 flex items-center justify-center rounded-full font-black mr-4 text-xl flex-shrink-0 border-2 border-solid ";
                    let resultIcon = "";
                    
                    if (isAnswered) {
                        if (optIdx === q.answer) {
                            btnClass += "bg-teal-100 border-teal-500 text-teal-900";
                            badgeClass += "bg-teal-500 border-teal-600 text-white";
                            resultIcon = '<span class="ml-auto text-3xl">⭕</span>';
                        } else if (optIdx === userAnswer) {
                            btnClass += "bg-rose-100 border-rose-500 text-rose-900";
                            badgeClass += "bg-rose-500 border-rose-600 text-white";
                            resultIcon = '<span class="ml-auto text-3xl">❌</span>';
                        } else {
                            btnClass += "bg-white border-gray-200 text-gray-400 opacity-70";
                            badgeClass += "bg-gray-100 border-gray-300 text-gray-400";
                        }
                    } else {
                        btnClass += "bg-white border-gray-300 hover:border-amber-400 hover:bg-amber-50 text-gray-700 cursor-pointer";
                        badgeClass += "bg-gray-100 border-gray-300 text-gray-500 group-hover:bg-amber-400 group-hover:border-amber-500 group-hover:text-amber-900 transition-colors";
                    }

                    const clickAction = isAnswered ? "" : `onclick="window.handleAnswer(${q.id}, ${optIdx})"`;

                    optionsHtml += `
                        <button ${clickAction} class="${btnClass}" ${isAnswered ? 'disabled' : ''}>
                            <span class="${badgeClass}">${letter}</span>
                            <span class="font-bold text-lg md:text-xl leading-relaxed font-serif">${opt}</span>
                            ${resultIcon}
                        </button>
                    `;
                });
                optionsHtml += '</div>';

                // 嚴格遵守：解析區塊帶有 💡 Emoji 與淡黃色背景對話框設計
                let explanationHtml = '';
                if (isAnswered) {
                    explanationHtml = `
                        <div class="mt-6 bg-yellow-50 p-6 rounded-[2rem] border-4 border-solid border-amber-200 animate-fade-in-up relative">
                            <div class="absolute -top-5 left-6 text-4xl bg-white rounded-full p-1 border-4 border-solid border-amber-200 shadow-sm">💡</div>
                            <div class="pt-4">
                                <span class="font-black text-amber-800 block mb-2 text-xl">解析小幫手：</span>
                                <p class="text-gray-700 text-lg md:text-xl leading-relaxed text-justify font-medium">${q.explanation}</p>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = headerHtml + optionsHtml + explanationHtml;
                container.appendChild(card);
            });

            ui.statCorrect.textContent = correctCount;
            ui.statWrong.textContent = wrongCount;
        }

        window.handleAnswer = function(qId, selectedIdx) {
            if (!currentState.username) return;

            currentState.answers[qId] = selectedIdx;
            
            const q = questionsData.find(x => x.id === qId);
            const isCorrect = q.answer === selectedIdx;
            
            if (!isCorrect) {
                if (!currentState.mistakes.includes(qId)) {
                    currentState.mistakes.push(qId);
                    saveUserData('mistakes');
                }
            }

            saveProgress();
            renderWaterfallQuiz();
        }

        window.toggleFavorite = function(qId) {
            if (!currentState.username) {
                window.customAlert('請先登入才能收藏題目喔！');
                return;
            }
            
            const idx = currentState.favorites.indexOf(qId);
            if (idx === -1) currentState.favorites.push(qId);
            else currentState.favorites.splice(idx, 1);
            
            saveUserData('favorites');
            renderWaterfallQuiz(); 
        }

        // --- Implementation of Review Modes ---
        window.showReview = function(type) {
            if (!currentState.username) return;

            if (type === 'wrong') {
                if (currentState.mistakes.length === 0) {
                    window.customAlert("太棒了！目前沒有錯題紀錄 🎉");
                    return;
                }
                currentState.viewMode = 'wrong';
            } else if (type === 'favorite') {
                if (currentState.favorites.length === 0) {
                    window.customAlert("目前沒有收藏任何題目喔 🤍");
                    return;
                }
                currentState.viewMode = 'favorite';
            } else {
                currentState.viewMode = 'all';
            }
            
            switchView('quiz');
            renderWaterfallQuiz();
        }

        // --- Persistence Helpers ---
        function saveProgress() {
            if (!isFirebaseReady || !currentState.username) return;
            const userRef = doc(db, COLLECTION_NAME, currentState.username);
            const progressData = {
                answers: currentState.answers,
                timestamp: new Date().getTime()
            };
            setDoc(userRef, { progress: progressData }, { merge: true });
        }

        function saveUserData(type) {
            if (!isFirebaseReady || !currentState.username) return;
            const userRef = doc(db, COLLECTION_NAME, currentState.username);
            const data = {};
            data[type] = currentState[type];
            setDoc(userRef, data, { merge: true });
        }

        window.logout = function() {
            if (currentUserUnsubscribe) currentUserUnsubscribe();
            currentState.username = '';
            ui.views.login.classList.remove('hidden');
            ui.views.dashboard.classList.add('hidden');
            ui.views.quiz.classList.add('hidden');
            ui.userDisplay.classList.add('hidden');
            document.getElementById('username').value = '';
        }
        
        window.goHome = function() {
            if (currentState.username) {
                window.scrollTo({top:0, behavior:'smooth'});
                switchView('dashboard');
            } else {
                window.location.reload();
            }
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in-up {
                animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
        `;
        document.head.appendChild(style);

        init();

    </script>
</body>
</html>
