            quiz: [

                { q: "「丘未『之』逮也」一句中，「之」字的作用為何？", opts: ["A. 代詞，作受詞且前置", "B. 助詞，無義", "C. 介詞，相當於「的」", "D. 動詞，前往"], ans: "A", exp: "這是一個否定句中的代詞賓語前置倒裝句。「未之逮」即「未逮之」，「之」代指大道之行與三代之英的盛世。" },

                { q: "「矜、寡、孤、獨」分別代表四種社會弱勢群體。其中「矜」字通「鰥」，指的是哪一種人？", opts: ["A. 老而無子者", "B. 幼而無父者", "C. 老而無妻者", "D. 老而無夫者"], ans: "C", exp: "鰥（矜）：老而無妻；寡：老而無夫；孤：幼而無父；獨：老而無子。" },
                { q: "承上題，「矜寡孤獨廢疾者」運用了哪一種修辭手法？", opts: ["A. 誇飾", "B. 譬喻", "C. 借代", "D. 雙關"], ans: "C", exp: "以「矜寡孤獨廢疾」這幾種特定的人，借代社會上所有無依無靠、需要幫助的弱勢群體。" },
                { q: "在大同世界中，對待「貨（物資、財富）」的態度是「貨惡其棄於地也，不必藏於己」。這句話的核心精神是？", opts: ["A. 強迫大家把財產全部捐給國家", "B. 厭惡浪費資源，但開發資源是為公眾而非私藏", "C. 覺得錢財太髒，寧可丟在地上", "D. 鼓勵人們大量消費刺激經濟"], ans: "B", exp: "人們珍惜物資不願浪費，但努力開發或獲取物資的出發點是大公無私，而非為了個人私吞。" },

                { q: "大同世界最終達到的社會治安狀態是「外戶而不閉」。請問其根本原因（前因）是什麼？", opts: ["A. 因為大家都很窮，沒有東西可偷", "B. 因為法律極度嚴苛，抓到就死刑", "C. 因為「謀閉而不興，盜竊亂賊而不作」", "D. 因為城牆蓋得特別高"], ans: "C", exp: "因為人人都大公無私，沒有陰謀與犯罪（謀閉而不興，亂賊而不作），所以大門根本不用關。" },
                { q: "孔子所描繪的「大同世界」，與後世哪一種政治制度的理念最為接近？", opts: ["A. 君主專制", "B. 封建世襲制", "C. 民主共和與社會福利制度", "D. 寡頭政治"], ans: "C", exp: "「天下為公」、「選賢與能」近於民主共和；「老弱皆有所養」近於社會福利制度。" },
                { q: "在《禮運》篇的後文中，孔子對比了「大同」與「小康」。大同是「天下為公」，那麼小康社會最主要的特徵是？", opts: ["A. 天下為家 (世襲制與私有制)", "B. 天下大亂", "C. 天下為公", "D. 天下無敵"], ans: "A", exp: "小康社會的特徵是「天下為家，各親其親，各子其子，貨力為己」，也就是退化到了私有與世襲的階級社會。" },

                { q: "下列字詞的讀音，何者標示「錯誤」？", opts: ["A. 矜寡孤獨：ㄐㄧㄣ", "B. 貨「惡」其棄：ㄨˋ", "C. 男有「分」：ㄈㄣˋ", "D. 幼有所「長」：ㄓㄤˇ"], ans: "A", exp: "「矜」在此通「鰥」，必須讀作「ㄍㄨㄢ」。" },
                { q: "「老有所終，壯有所用，幼有所長」這三句，在修辭上主要使用了何種技巧？", opts: ["A. 擬人", "B. 頂真", "C. 排比", "D. 譬喻"], ans: "C", exp: "三句結構相同、字數相等、意義相關，是標準的排比句，增強了語氣的氣勢與連貫性。" },
                { q: "下列哪一個成語，最不符合「大同世界」的理想情境？", opts: ["A. 守望相助", "B. 錙銖必較", "C. 夜不閉戶", "D. 矜貧恤獨"], ans: "B", exp: "「錙銖必較」形容對極小的利益也非常計較，這與大同世界「不必為己、不必藏於己」的大公無私精神完全相反。" },
                { q: "關於《禮記》這本書，下列敘述何者正確？", opts: ["A. 由孔子親筆撰寫", "B. 屬於道家經典", "C. 為西漢戴聖所編纂，又稱《小戴禮記》", "D. 是一部醫學著作"], ans: "C", exp: "《禮記》（小戴禮記）是由西漢學者戴聖編纂的儒家經典，記錄了先秦儒家的禮儀與哲學思想。" },
                { q: "孔子在感嘆「丘未之逮也」時，他的情緒最可能是？", opts: ["A. 憤怒與嫉妒", "B. 驚恐與害怕", "C. 遺憾與嚮往", "D. 驕傲與自滿"], ans: "C", exp: "孔子感嘆自己生不逢時，沒能親自經歷那個完美的盛世，但內心依然充滿崇高的嚮往（而有志焉）。" },
                { q: "「謀閉而不興」的「興」字，與下列哪一個詞語中的「興」字意義最接近？", opts: ["A. 興高采烈", "B. 夙興夜寐", "C. 興風作浪", "D. 興會淋漓"], ans: "C", exp: "「謀閉而不興」的興是「發生、發起」之意。「興風作浪」的興也是發起、挑起的意思。" }

        // 預處理所有關鍵字 (確保能在內文中被高亮並綁定事件)
        const allKeywords = {};
        contentData.segments.forEach((seg, idx) => {
            Object.entries(seg.notes).forEach(([key, note]) => {
                if (!allKeywords[key]) {
                    allKeywords[key] = { ...note, segIdx: idx };
                }
            });

        // ----------------------------------------------------
        // 2. 全域狀態管理 (靜態版本)
        // ----------------------------------------------------
        let currentTab = 'overview';
        let userAnswers = {};

                 window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };

                    closeNote();

            const popup = document.getElementById('note-template');

        }

        function switchTab(tabId) {

                switch(tabId) {
                    case 'overview': renderOverview(container); break;

                    case 'vocabulary': renderVocabulary(container); break;

                }
                container.style.opacity = '1';
            }, 200);
        }

        function renderOverview(container) {
            container.innerHTML = `

        function renderReading(container) {
            let segmentsHtml = contentData.segments.map((seg, idx) => {
                let displayHtml = seg.original;

        function submitQuiz() {
            const total = contentData.quiz.length;
            const answered = Object.keys(userAnswers).length;
            
            if (answered < total) {
                showError(`您還有 ${total - answered} 題未完成，請作答完畢後再交卷！`);
                return;
            }
            
            let correctCount = 0;
            for (let i = 0; i < total; i++) {
                if (userAnswers[i] === contentData.quiz[i].ans) {
                    correctCount++;
                }
            }
            
            const score = Math.round((correctCount / total) * 100);
            const scoreText = document.getElementById('score-text');
            scoreText.innerHTML = `您的總分是 <span class="text-amber-600 font-bold text-5xl">${score}</span> 分`;
            
            const modal = document.getElementById('score-modal');
            modal.classList.remove('hidden');
            
            try {

        }

        function closeScoreModal() {
            const modal = document.getElementById('score-modal');
            modal.classList.add('hidden');
        }
        
        function showNote(key, segIdx, el, e) {
            if (e && e.stopPropagation) e.stopPropagation();
            const popup = document.getElementById('note-template');
            const content = document.getElementById('note-content');
            let noteData = null;
            
            if (segIdx !== undefined && contentData.segments[segIdx] && contentData.segments[segIdx].notes[key]) { 
                noteData = contentData.segments[segIdx].notes[key]; 
            } else if (allKeywords[key]) { 
                noteData = allKeywords[key]; 
            }
            
            if(!noteData) return;
            
            content.innerHTML = `
                <div class="flex items-baseline justify-between border-b border-amber-100 pb-2 mb-2">
                    <h4 class="text-xl font-bold text-amber-900 font-serif">${key}</h4>
                    <span class="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full font-bold">${noteData.type || noteData.pos}</span>
                </div>
                <p class="text-sm text-amber-700 mb-2 font-mono bg-orange-50 px-2 py-1 rounded inline-block">${noteData.zhuyin}</p>
                <p class="text-amber-800 leading-relaxed font-medium">${noteData.def || noteData.meaning}</p>
            `;
            
            const rect = el.getBoundingClientRect();
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            let left = rect.left + scrollLeft;
            let top = rect.bottom + scrollTop + 8; 
            
            if (left + 300 > document.body.clientWidth) { left = document.body.clientWidth - 310; }
            
            popup.style.left = `${left}px`;
            popup.style.top = `${top}px`;
            popup.classList.remove('hidden');
        }

        // 語音播放優化：優先女聲，語速0.9，音調1.05，標點細緻停頓
        async function playAudio(text) {
            if (!('speechSynthesis' in window)) { showError("您的瀏覽器不支援語音朗讀功能。"); return; }
            window.speechSynthesis.cancel();
            
            let voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                await new Promise(resolve => {
                    const id = setInterval(() => {
                        voices = window.speechSynthesis.getVoices();
                        if (voices.length > 0) { clearInterval(id); resolve(); }
                    }, 100);
                });
            }

            // 優先尋找高品質女聲
            let targetVoice = voices.find(v => (v.lang === 'zh-TW' || v.lang === 'cmn-Hant-TW' || v.lang === 'zh-CN') && 
                (v.name.includes('Google 國語') || v.name.includes('Mei-Jia') || v.name.includes('Yating') || v.name.includes('Lili') || v.name.includes('Ting-Ting') || v.name.includes('Xiaoxiao')));
            
            if (!targetVoice) targetVoice = voices.find(v => v.lang === 'zh-TW' || v.lang === 'cmn-Hant-TW'); 
            if (!targetVoice) targetVoice = voices.find(v => v.lang.startsWith('zh'));

            // 細緻標點分割與停頓控制
            const chunks = text.split(/([，、。？！；：])/).reduce((acc, curr, i) => {
                if (i % 2 === 0) { 
                    if (curr.trim()) acc.push({ text: curr, pause: 0 });
                } else { 
                    if (acc.length > 0) {
                        acc[acc.length - 1].text += curr;
                        if (['。', '！', '？'].includes(curr)) acc[acc.length - 1].pause = 800;
                        else if (['；', '：'].includes(curr)) acc[acc.length - 1].pause = 600;
                        else acc[acc.length - 1].pause = 400; 
                    }
                }
                return acc;
            }, []);

            if (chunks.length === 0) return;

            const playNext = (index) => {
                if (index >= chunks.length) return;
                const utterance = new SpeechSynthesisUtterance(chunks[index].text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.9;  // 放慢語速至 0.9
                utterance.pitch = 1.05; // 提高音調至 1.05
                if (targetVoice) utterance.voice = targetVoice;
                
                utterance.onend = () => { setTimeout(() => playNext(index + 1), chunks[index].pause); };
                window.speechSynthesis.speak(utterance);
            };

            playNext(0);
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-msg').innerText = msg;
            toast.classList.remove('hidden');
            requestAnimationFrame(() => { toast.classList.remove('translate-y-10', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.classList.add('hidden'), 300); }, 4000);
        }

    </script>
