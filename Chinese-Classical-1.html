                id: 'start',
                text: "你是齊國稷下學宮的一名年輕學子。今日，各派大師齊聚一堂，探討宇宙的邊界與天象的奧秘。大師突然指著你，問了一個你完全不懂、極其深奧的天文學問題。所有人的目光都集中在你身上。這時，你決定...",
                choices: [
                    { text: "為了面子，憑藉自己讀過的一些零碎知識，硬是胡謅了一套聽起來很厲害的理論。", next: "fake_it" },
                    { text: "坦然鞠躬：「弟子才疏學淺，確實不知。懇請大師賜教。」", next: "admit_ignorance" }
                ]
            },
            fake_it: {
                id: 'fake_it',
                text: "【不知不知，病】你口若懸河地說了一大串，台下卻傳來幾聲輕笑。大師毫不留情地指出了你理論中漏洞百出、自相矛盾的地方。你羞愧得滿臉通紅。你犯了不懂裝懂的毛病，不僅沒有得到尊重，反而失去了學者的誠信。",
                choices: [{ text: "重來，老子說過，不知不知才是病", next: "start" }],
                isEnding: true
            },
            admit_ignorance: {
                id: 'admit_ignorance',
                text: "【知不知，上】大師聽了你的回答，非但沒有生氣，反而微微頷首：「善。學問浩如煙海，誰能全知？你能坦承自己的無知，不強不知以為知，這正是求學的最高境界啊！」你因此獲得了眾人的敬重，並真正學到了新知識。",
                choices: [
                    { text: "回到總覽，銘記老子的教誨", next: "start" }
                ],
                isEnding: true,
                win: true
            }
        };

        function renderStory(container) {
            if(!window.currentStoryNode) window.currentStoryNode = 'start';
            const node = storyNodes[window.currentStoryNode];

            const localPath = `Chinese-Classical-1-images/rpg_${window.currentStoryNode}.jpg`;
            let imageContent = `
                <div class="w-full overflow-hidden rounded-t-xl bg-gray-100">
                    <img src="${localPath}" class="w-full h-auto fade-in-image shadow-inner" alt="場景圖" onerror="this.style.display='none'">
                </div>
            `;

            container.innerHTML = `<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-orange-100">${imageContent}<div class="p-8 sm:p-10"><div class="flex items-center mb-6 text-amber-800 text-sm font-bold uppercase tracking-widest border-b border-orange-100 pb-2"><i class="fas fa-compass mr-2"></i> 抉擇時刻</div><p class="text-xl sm:text-2xl leading-relaxed text-amber-900 mb-10 font-serif">${node.text}</p>${node.isEnding ? (node.win ? `<div class="text-center mb-8 text-green-700 font-bold text-2xl p-6 bg-green-50 rounded-xl border border-green-200 shadow-sm"><i class="fas fa-check-circle mr-3"></i>真知灼見</div>` : `<div class="text-center mb-8 text-orange-700 font-bold text-2xl p-6 bg-orange-50 rounded-xl border border-orange-200 shadow-sm"><i class="fas fa-redo mr-3"></i>重新體驗</div>`) : ''}<div class="grid gap-4">${node.choices.map(c => `<button onclick="nextStoryNode('${c.next}')" class="story-choice w-full py-5 px-8 bg-white hover:bg-orange-50 border-2 border-orange-200 hover:border-amber-500 rounded-xl text-amber-900 font-bold text-xl transition duration-200 flex items-center justify-between group shadow-sm hover:shadow-md text-left"><span>${c.text}</span><i class="fas fa-chevron-right text-amber-300 group-hover:text-amber-600 transition transform group-hover:translate-x-1"></i></button>`).join('')}</div></div></div>`;
            if(node.win) { try { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); } catch (e) { console.log("Confetti not loaded"); } }
        }

        function nextStoryNode(nodeId) {
            window.currentStoryNode = nodeId;
            renderStory(document.getElementById('content-display'));
        }

        function checkAnswer(idx, val, ans) {
            if (userAnswers[idx] !== undefined) return; 
            userAnswers[idx] = val; 
            const radios = document.getElementsByName(`q-${idx}`);
            for (let radio of radios) {
                radio.disabled = true;
                radio.parentElement.classList.add('disabled-label');
            }

            const feedbackEl = document.getElementById(`feedback-${idx}`);
            const card = document.getElementById(`quiz-card-${idx}`);
            const qData = contentData.quiz[idx];
            if (!feedbackEl || !card) return;
            
            feedbackEl.className = 'mt-4 p-4 rounded-lg text-base animate-fade-in border';
            card.classList.remove('bg-white');

            if (val === ans) {
                feedbackEl.innerHTML = `<strong class="block mb-1 text-lg"><i class="fas fa-check-circle mr-2"></i>答對了！</strong>${qData.exp}`;
                feedbackEl.classList.add('bg-green-50', 'border-green-200', 'text-green-900');
                card.classList.add('bg-green-50/30', 'border-green-500');
            } else {
                const correctOption = qData.opts.find((opt, i) => ["A","B","C","D"][i] === ans);
                const userOption = qData.opts.find((opt, i) => ["A","B","C","D"][i] === val);
                
                feedbackEl.innerHTML = `
                    <div class="mb-2">
                        <span class="block font-bold text-red-700 text-lg"><i class="fas fa-times-circle mr-2"></i>答錯了</span>
                        <span class="block text-amber-800 mt-1">您的答案：${userOption}</span>
                        <span class="block text-green-700 font-bold mt-1">正確答案：${correctOption}</span>
                    </div>
                    <div class="pt-2 border-t border-red-200 mt-2 text-amber-900">
                        <strong><i class="fas fa-lightbulb text-yellow-500 mr-1"></i>解析：</strong>${qData.exp}
                    </div>
                `;
                feedbackEl.classList.add('bg-red-50', 'border-red-200', 'text-amber-900');
                card.classList.add('bg-red-50/30', 'border-red-500');
            }
            feedbackEl.classList.remove('hidden');
        }

        function submitQuiz() {
            const total = contentData.quiz.length;
            const answered = Object.keys(userAnswers).length;
            
            if (answered < total) {
                showError(`您還有 ${total - answered} 題未完成，請作答完畢後再交卷！`);
                return;
            }
            
            let correctCount = 0;
            for (let i = 0; i < total; i++) {
                if (userAnswers[i] === contentData.quiz[i].ans) {
                    correctCount++;
                }
            }
            
            const score = Math.round((correctCount / total) * 100);
            const scoreText = document.getElementById('score-text');
            scoreText.innerHTML = `您的總分是 <span class="text-amber-600 font-bold text-5xl">${score}</span> 分`;
            
            const modal = document.getElementById('score-modal');
            modal.classList.remove('hidden');
            
            try {
                if(score >= 80) { confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } }); }
            } catch(e) {}
        }

        function closeScoreModal() {
            const modal = document.getElementById('score-modal');
            modal.classList.add('hidden');
        }
        
        function showNote(key, segIdx, el, e) {
            if (e && e.stopPropagation) e.stopPropagation();
            const popup = document.getElementById('note-template');
            const content = document.getElementById('note-content');
            let noteData = null;
            
            if (segIdx !== undefined && contentData.segments[segIdx] && contentData.segments[segIdx].notes[key]) { 
                noteData = contentData.segments[segIdx].notes[key]; 
            } else if (allKeywords[key]) { 
                noteData = allKeywords[key]; 
            }
            
            if(!noteData) return;
            
            content.innerHTML = `
                <div class="flex items-baseline justify-between border-b border-amber-100 pb-2 mb-2">
                    <h4 class="text-xl font-bold text-amber-900 font-serif">${key}</h4>
                    <span class="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full font-bold">${noteData.type || noteData.pos}</span>
                </div>
                <p class="text-sm text-amber-700 mb-2 font-mono bg-orange-50 px-2 py-1 rounded inline-block">${noteData.zhuyin}</p>
                <p class="text-amber-800 leading-relaxed font-medium">${noteData.def || noteData.meaning}</p>
            `;
            
            const rect = el.getBoundingClientRect();
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            let left = rect.left + scrollLeft;
            let top = rect.bottom + scrollTop + 8; 
            
            if (left + 300 > document.body.clientWidth) { left = document.body.clientWidth - 310; }
            
            popup.style.left = `${left}px`;
            popup.style.top = `${top}px`;
            popup.classList.remove('hidden');
        }

        function processTextWithNotes(text) {
            let processedText = marked.parse(text);
            const sortedKeys = Object.keys(allKeywords).sort((a, b) => b.length - a.length);
            
            sortedKeys.forEach(key => {
                const regex = new RegExp(`(?<!<[^>]*)${key}`, "g");
                processedText = processedText.replace(regex, `<span class="interactive-word bg-orange-50 px-1 rounded" onclick="showNote('${key}', undefined, this, event)">${key}</span>`);
            });
            return processedText;
        }

        async function playAudio(text) {
            if (!('speechSynthesis' in window)) { showError("您的瀏覽器不支援語音朗讀功能。"); return; }
            window.speechSynthesis.cancel();
            
            let voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                await new Promise(resolve => {
                    const id = setInterval(() => {
                        voices = window.speechSynthesis.getVoices();
                        if (voices.length > 0) { clearInterval(id); resolve(); }
                    }, 100);
                });
            }

            let targetVoice = voices.find(v => (v.lang === 'zh-TW' || v.lang === 'cmn-Hant-TW' || v.lang === 'zh-CN') && 
                (v.name.includes('Google 國語') || v.name.includes('Mei-Jia') || v.name.includes('Yating') || v.name.includes('Lili') || v.name.includes('Ting-Ting') || v.name.includes('Xiaoxiao')));
            
            if (!targetVoice) targetVoice = voices.find(v => v.lang === 'zh-TW' || v.lang === 'cmn-Hant-TW'); 
            if (!targetVoice) targetVoice = voices.find(v => v.lang.startsWith('zh'));

            const chunks = text.split(/([，、。？！；：])/).reduce((acc, curr, i) => {
                if (i % 2 === 0) { 
                    if (curr.trim()) acc.push({ text: curr, pause: 0 });
                } else { 
                    if (acc.length > 0) {
                        acc[acc.length - 1].text += curr;
                        if (['。', '！', '？'].includes(curr)) acc[acc.length - 1].pause = 800;
                        else if (['；', '：'].includes(curr)) acc[acc.length - 1].pause = 600;
                        else acc[acc.length - 1].pause = 400; 
                    }
                }
                return acc;
            }, []);

            if (chunks.length === 0) return;

            const playNext = (index) => {
                if (index >= chunks.length) return;
                const utterance = new SpeechSynthesisUtterance(chunks[index].text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.9;  
                utterance.pitch = 1.05; 
                if (targetVoice) utterance.voice = targetVoice;
                
                utterance.onend = () => { setTimeout(() => playNext(index + 1), chunks[index].pause); };
                window.speechSynthesis.speak(utterance);
            };

            playNext(0);
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-msg').innerText = msg;
            toast.classList.remove('hidden');
            requestAnimationFrame(() => { toast.classList.remove('translate-y-10', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.classList.add('hidden'), 300); }, 4000);
        }
    </script>
