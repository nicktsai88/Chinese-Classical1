        function renderAnalysis(container) {
            const rhetoricHtml = contentData.rhetoric.map(r => `

                    <div class="flex-shrink-0 mr-5">
                        <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center text-amber-600 font-bold text-lg shadow-sm">
                            <i class="fas fa-feather-alt"></i>

                    </div>
                    <div class="prose prose-amber text-amber-900 text-lg">
                        ${marked.parse(r)}
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="max-w-4xl mx-auto space-y-12">
                    <section>
                        <h2 class="text-2xl font-bold text-amber-900 mb-6 font-serif flex items-center">
                            <i class="fas fa-lightbulb mr-3 text-yellow-500"></i>全文主旨與核心哲理

        function renderQuiz(container) {
            let quizHtml = contentData.quiz.map((q, i) => {
                const val = ["A","B","C","D"];
                const isAnswered = userAnswers[i] !== undefined;
                const userAnswer = userAnswers[i];
                let feedback = '';
                let cardClass = "bg-white border border-orange-200 hover:border-amber-300";
                let feedbackClass = "hidden mt-4 p-4 rounded-lg text-base bg-orange-50 border border-orange-100"; 
                
                if (isAnswered) {
                    feedbackClass = "mt-4 p-4 rounded-lg text-base animate-fade-in border"; 
                    if (userAnswer === q.ans) {
                        feedback = `<strong class="block mb-1 text-lg"><i class="fas fa-check-circle mr-2"></i>答對了！</strong>${q.exp}`;
                        cardClass = "bg-green-50/30 border border-green-500 shadow-sm";

                    } else {
                        const userOption = q.opts.find((opt, idx) => ["A","B","C","D"][idx] === userAnswer);
                        const correctOption = q.opts.find((opt, idx) => ["A","B","C","D"][idx] === q.ans);
                        feedback = `
                            <div class="mb-2">
                                <span class="block font-bold text-red-700 text-lg"><i class="fas fa-times-circle mr-2"></i>答錯了</span>
                                <span class="block text-amber-800 mt-1">您的答案：${userOption}</span>
                                <span class="block text-green-700 font-bold mt-1">正確答案：${correctOption}</span>
                            </div>
                            <div class="pt-2 border-t border-red-200 mt-2 text-amber-900">

                            </div>
                        `;

                        feedbackClass += " bg-red-50 border-red-200 text-red-900";

                return `
                <div class="${cardClass} rounded-xl p-6 mb-8 shadow-sm transition-all duration-300" id="quiz-card-${i}">
                    <div class="flex items-start mb-4">

                        <p class="font-bold text-xl text-amber-900 leading-relaxed">${q.q}</p>

                            return `

                    <div id="feedback-${i}" class="${feedbackClass}">${feedback}</div>

            `}).join('');
            
            container.innerHTML = `
                <div class="max-w-3xl mx-auto pb-24">

                    ${quizHtml}

        // [Tab Story] 抉擇之路 (RPG)
        const storyNodes = {

                choices: [
                    { text: "「治理國家太難了！寡人實在是能力不足，『不能』做到啊！」", next: "excuse_king" },
                    { text: "陷入沉思，虛心求教：「那先生您說，不願意做（不為）和做不到（不能），具體有什麼差別？」", next: "learn_king" }
                ]
            },
            excuse_king: {
                id: 'excuse_king',
                text: "【是誠不為也】孟子聽後搖了搖頭，嘆息道：「大王，把泰山夾在腋下跳過北海，那是真的『不能』；但為長輩折下一根樹枝，您若說不能，那純粹是『不為』！庇護百姓，不過是折枝之易，您卻以此推託，國家危矣！」你滿面羞愧，無言以對。",
                choices: [{ text: "重來，王者不該逃避責任", next: "start" }],
                isEnding: true
            },
            learn_king: {
                id: 'learn_king',
                text: "【天下可運於掌】孟子欣慰地笑了，他告訴你：「王之不王，是折枝之類也。您只需要把愛護自己長輩與晚輩的心，推廣到全天下的長輩與晚輩身上（老吾老以及人之老）。只要肯『推恩』，治理天下將如在掌心運轉般容易！」你豁然開朗，決心施行王道。",
                choices: [
                    { text: "回到總覽，銘記推恩之道", next: "start" }
                ],
                isEnding: true,
                win: true

            container.innerHTML = `<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-orange-100">${imageContent}<div class="p-8 sm:p-10"><div class="flex items-center mb-6 text-amber-800 text-sm font-bold uppercase tracking-widest border-b border-orange-100 pb-2"><i class="fas fa-compass mr-2"></i> 抉擇時刻</div><p class="text-xl sm:text-2xl leading-relaxed text-amber-900 mb-10 font-serif">${node.text}</p>${node.isEnding ? (node.win ? `<div class="text-center mb-8 text-green-700 font-bold text-2xl p-6 bg-green-50 rounded-xl border border-green-200 shadow-sm"><i class="fas fa-check-circle mr-3"></i>王道之始</div>` : `<div class="text-center mb-8 text-orange-700 font-bold text-2xl p-6 bg-orange-50 rounded-xl border border-orange-200 shadow-sm"><i class="fas fa-redo mr-3"></i>重新體驗</div>`) : ''}<div class="grid gap-4">${node.choices.map(c => `<button onclick="nextStoryNode('${c.next}')" class="story-choice w-full py-5 px-8 bg-white hover:bg-orange-50 border-2 border-orange-200 hover:border-amber-500 rounded-xl text-amber-900 font-bold text-xl transition duration-200 flex items-center justify-between group shadow-sm hover:shadow-md text-left"><span>${c.text}</span><i class="fas fa-chevron-right text-amber-300 group-hover:text-amber-600 transition transform group-hover:translate-x-1"></i></button>`).join('')}</div></div></div>`;

        function nextStoryNode(nodeId) {

        function checkAnswer(idx, val, ans) {
            if (userAnswers[idx] !== undefined) return; 
            userAnswers[idx] = val; 
            const radios = document.getElementsByName(`q-${idx}`);
            for (let radio of radios) {
                radio.disabled = true;
                radio.parentElement.classList.add('disabled-label');
            }

            const feedbackEl = document.getElementById(`feedback-${idx}`);
            const card = document.getElementById(`quiz-card-${idx}`);
            const qData = contentData.quiz[idx];
            if (!feedbackEl || !card) return;
            
            feedbackEl.className = 'mt-4 p-4 rounded-lg text-base animate-fade-in border';
            card.classList.remove('bg-white');

            if (val === ans) {
                feedbackEl.innerHTML = `<strong class="block mb-1 text-lg"><i class="fas fa-check-circle mr-2"></i>答對了！</strong>${qData.exp}`;
                feedbackEl.classList.add('bg-green-50', 'border-green-200', 'text-green-900');
                card.classList.add('bg-green-50/30', 'border-green-500');
            } else {
                const correctOption = qData.opts.find((opt, i) => ["A","B","C","D"][i] === ans);
                const userOption = qData.opts.find((opt, i) => ["A","B","C","D"][i] === val);
                
                feedbackEl.innerHTML = `
                    <div class="mb-2">
                        <span class="block font-bold text-red-700 text-lg"><i class="fas fa-times-circle mr-2"></i>答錯了</span>
                        <span class="block text-amber-800 mt-1">您的答案：${userOption}</span>
                        <span class="block text-green-700 font-bold mt-1">正確答案：${correctOption}</span>

                    <div class="pt-2 border-t border-red-200 mt-2 text-amber-900">

                card.classList.add('bg-red-50/30', 'border-red-500');

            feedbackEl.classList.remove('hidden');
        }

        function submitQuiz() {
            const total = contentData.quiz.length;
            const answered = Object.keys(userAnswers).length;
            
            if (answered < total) {
                showError(`您還有 ${total - answered} 題未完成，請作答完畢後再交卷！`);
                return;
            }
            
            let correctCount = 0;
            for (let i = 0; i < total; i++) {
                if (userAnswers[i] === contentData.quiz[i].ans) {
                    correctCount++;
                }
            }
            
            const score = Math.round((correctCount / total) * 100);
            const scoreText = document.getElementById('score-text');
            scoreText.innerHTML = `您的總分是 <span class="text-amber-600 font-bold text-5xl">${score}</span> 分`;
            
            const modal = document.getElementById('score-modal');
            modal.classList.remove('hidden');
            
            try {
                if(score >= 80) { confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } }); }
            } catch(e) {}
        }

        function closeScoreModal() {
            const modal = document.getElementById('score-modal');
            modal.classList.add('hidden');
        }
        
        function showNote(key, segIdx, el, e) {
            if (e && e.stopPropagation) e.stopPropagation();
            const popup = document.getElementById('note-template');
            const content = document.getElementById('note-content');
            let noteData = null;
            
            if (segIdx !== undefined && contentData.segments[segIdx] && contentData.segments[segIdx].notes[key]) { 
                noteData = contentData.segments[segIdx].notes[key]; 
            } else if (allKeywords[key]) { 
                noteData = allKeywords[key]; 
            }
            
            if(!noteData) return;
            
            content.innerHTML = `
                <div class="flex items-baseline justify-between border-b border-amber-100 pb-2 mb-2">
                    <h4 class="text-xl font-bold text-amber-900 font-serif">${key}</h4>
                    <span class="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full font-bold">${noteData.type || noteData.pos}</span>
                </div>
                <p class="text-sm text-amber-700 mb-2 font-mono bg-orange-50 px-2 py-1 rounded inline-block">${noteData.zhuyin}</p>
                <p class="text-amber-800 leading-relaxed font-medium">${noteData.def || noteData.meaning}</p>
            `;
            
            const rect = el.getBoundingClientRect();
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            let left = rect.left + scrollLeft;
            let top = rect.bottom + scrollTop + 8; 
            
            if (left + 300 > document.body.clientWidth) { left = document.body.clientWidth - 310; }
            
            popup.style.left = `${left}px`;
            popup.style.top = `${top}px`;
            popup.classList.remove('hidden');
        }

        // 語音播放優化：優先女聲，語速0.9，音調1.05，標點細緻停頓
        async function playAudio(text) {
            if (!('speechSynthesis' in window)) { showError("您的瀏覽器不支援語音朗讀功能。"); return; }
            window.speechSynthesis.cancel();
            
            let voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                await new Promise(resolve => {
                    const id = setInterval(() => {
                        voices = window.speechSynthesis.getVoices();
                        if (voices.length > 0) { clearInterval(id); resolve(); }
                    }, 100);
                });
            }

            // 優先尋找高品質女聲
            let targetVoice = voices.find(v => (v.lang === 'zh-TW' || v.lang === 'cmn-Hant-TW' || v.lang === 'zh-CN') && 
                (v.name.includes('Google 國語') || v.name.includes('Mei-Jia') || v.name.includes('Yating') || v.name.includes('Lili') || v.name.includes('Ting-Ting') || v.name.includes('Xiaoxiao')));
            
            if (!targetVoice) targetVoice = voices.find(v => v.lang === 'zh-TW' || v.lang === 'cmn-Hant-TW'); 
            if (!targetVoice) targetVoice = voices.find(v => v.lang.startsWith('zh'));

            // 細緻標點分割與停頓控制
            const chunks = text.split(/([，、。？！；：])/).reduce((acc, curr, i) => {
                if (i % 2 === 0) { 
                    if (curr.trim()) acc.push({ text: curr, pause: 0 });
                } else { 
                    if (acc.length > 0) {
                        acc[acc.length - 1].text += curr;
                        if (['。', '！', '？'].includes(curr)) acc[acc.length - 1].pause = 800;
                        else if (['；', '：'].includes(curr)) acc[acc.length - 1].pause = 600;
                        else acc[acc.length - 1].pause = 400; 
                    }
                }
                return acc;
            }, []);

            if (chunks.length === 0) return;

            const playNext = (index) => {
                if (index >= chunks.length) return;
                const utterance = new SpeechSynthesisUtterance(chunks[index].text);
                utterance.lang = 'zh-TW';
                utterance.rate = 0.9;  // 放慢語速至 0.9
                utterance.pitch = 1.05; // 提高音調至 1.05
                if (targetVoice) utterance.voice = targetVoice;
                
                utterance.onend = () => { setTimeout(() => playNext(index + 1), chunks[index].pause); };
                window.speechSynthesis.speak(utterance);
            };

            playNext(0);
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-msg').innerText = msg;
            toast.classList.remove('hidden');
            requestAnimationFrame(() => { toast.classList.remove('translate-y-10', 'opacity-0'); });
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.classList.add('hidden'), 300); }, 4000);
        }

    </script>
